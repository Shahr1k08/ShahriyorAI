<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#6a11cb,#2575fc,#00dbde,#fc00ff);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.login{
    width:380px;
    padding:40px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:25px;
    box-shadow:0 0 40px rgba(0,0,0,.35);
    text-align:center;
}

.login h1{
    color:#fff;
    margin-bottom:30px;
    font-size:32px;
}

.input-box{
    margin:20px 0;
}

.input-box input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:15px;
    background:rgba(255,255,255,.18);
    color:#fff;
    font-size:16px;
}

.input-box input::placeholder{
    color:#eee;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:linear-gradient(90deg,#ff512f,#dd2476);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 0 20px rgba(255,0,150,.5);
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 35px rgba(255,0,200,.8);
}

.links{
    margin-top:20px;
}

.links a{
    color:white;
    text-decoration:none;
    font-size:14px;
}

.logo{
    width:90px;
    height:90px;
    margin:auto;
    margin-bottom:20px;
    border-radius:50%;
    background:linear-gradient(135deg,#00f2fe,#4facfe);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    color:white;
    box-shadow:0 0 30px cyan;
}
</style>
</head>

<body>

<div class="login">

<div class="logo">🚀</div>

<h1>Welcome</h1>

<div class="input-box">
<input type="text" placeholder="Username">
</div>

<div class="input-box">
<input type="password" placeholder="Password">
</div>

<button>Kirish</button>

<div class="links">
<a href="#">Parolni unutdingizmi?</a>
</div>

</div>

</body>
</html>
