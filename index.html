<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShahriyorAI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(-45deg,#4F46E5,#06B6D4,#9333EA,#EC4899);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:90%;
max-width:420px;
padding:40px 30px;
text-align:center;
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
border-radius:30px;
border:1px solid rgba(255,255,255,.25);
box-shadow:0 20px 50px rgba(0,0,0,.35);
color:#fff;
}

.logo{
width:110px;
height:110px;
margin:auto;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:55px;
background:linear-gradient(135deg,#00E5FF,#7C4DFF);
box-shadow:0 0 35px #00E5FF;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
50%{
transform:translateY(-10px);
}
}

h1{
margin-top:25px;
font-size:34px;
}

p{
margin:15px 0 30px;
font-size:15px;
line-height:1.7;
opacity:.95;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:15px;
font-size:18px;
font-weight:600;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#FF512F,#DD2476);
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 30px #ff4da6;
}

.footer{
margin-top:20px;
font-size:13px;
opacity:.8;
}
</style>

</head>
<body>

<div class="card">

<div class="logo">🤖</div>

<h1>ShahriyorAI</h1>

<p>
Sun'iy intellekt yordamchisiga xush kelibsiz.
Savollaringizga tezkor va aqlli javob oling.
</p>

<button onclick="openChat()">
🚀 Chatni boshlash
</button>

<div class="footer">
Powered by ShahriyorAI
</div>

</div>

<script>
function openChat(){
document.querySelector(".card").innerHTML=`
<h2 style="color:white;">🤖 ShahriyorAI</h2>

<div style="height:350px;background:#222;border-radius:15px;padding:15px;margin:20px 0;overflow:auto;">
<p><b>ShahriyorAI:</b> Assalomu alaykum! Sizga qanday yordam bera olaman?</p>
</div>

<div style="display:flex;gap:10px;">
<input type="text" placeholder="Xabar yozing..."
style="flex:1;padding:15px;border:none;border-radius:12px;outline:none;">

<button style="padding:15px 20px;border:none;border-radius:12px;background:#ff4d6d;color:white;">
➤
</button>
</div>
`;
}
</script>  
  
</body>
</html>
