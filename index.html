<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaxriyor AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="sidebar">
        <h2>🤖 Shaxriyor AI</h2>
        <button class="new-chat">+ Yangi chat</button>

        <div class="history">
            <p>Bugungi suhbat</p>
        </div>
    </div>

    <div class="chat">

        <div class="header">
            <h1>Shaxriyor AI</h1>
        </div>

        <div id="messages" class="messages">
            <div class="ai">
                Assalomu alaykum! Men Shaxriyor AI. Istalgan savolingizni yozing.
            </div>
        </div>

        <div class="input-area">
            <input
                type="text"
                id="question"
                placeholder="Savolingizni yozing..."
            >

            <button onclick="sendMessage()">
                Yuborish
            </button>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
